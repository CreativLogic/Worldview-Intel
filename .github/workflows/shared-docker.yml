name: Shared Docker Build

on:
  workflow_call:
    inputs:
      tags:
        type: string
        required: true
      build-args:
        type: string
        default: ''
      smoke-test-path:
        type: string
        default: /api/health
      smoke-test-port:
        type: string
        default: '3000'
      is-preview:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: ${{ inputs.tags }}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@7c581b5b4df1a7b927b8684d5cb3f8d6bb9a5b44
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        continue-on-error: ${{ inputs.is-preview }}

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM
        uses: anchore/syft-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Sign image with Cosign
        if: ${{ !inputs.is-preview }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}

      - name: Smoke test
        run: |
          IMAGE="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          CONTAINER_NAME="smoke-${{ github.sha }}"
          docker run -d --name $CONTAINER_NAME -p ${{ inputs.smoke-test-port }}:${{ inputs.smoke-test-port }} $IMAGE
          sleep 15
          curl -f --retry 5 --retry-delay 3 http://localhost:${{ inputs.smoke-test-port }}${{ inputs.smoke-test-path }} || EXIT=$?
          docker stop $CONTAINER_NAME
          docker rm $CONTAINER_NAME
          exit ${EXIT:-0}
        continue-on-error: ${{ inputs.is-preview }}

      - name: Trigger Coolify deploy
        if: ${{ secrets.COOLIFY_API_TOKEN != '' && !inputs.is-preview }}
        run: |
          curl -s -X POST "https://coolify.serv.wwv.io/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"force": false}'
