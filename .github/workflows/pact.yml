name: Contract Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/pact/**'
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test:pact
        env:
          PACT_BROKER_URL: http://pactbroker.worldwideview.dev
          PACT_BROKER_USERNAME: silver
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

      - name: Publish contracts to Pact Broker
        if: github.actor != 'dependabot[bot]'
        run: pnpm exec pact-broker publish pacts/ --consumer-app-version ${{ github.sha }} --broker-base-url $PACT_BROKER_URL --broker-username silver --broker-password ${{ secrets.PACT_BROKER_PASSWORD }}
        env:
          PACT_BROKER_URL: http://pactbroker.worldwideview.dev
